<svg viewBox="0 0 600 375" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Preview of Beauty Empire Salon website">
  <!-- outer frame -->
  <rect width="600" height="375" rx="10" fill="#0F0E0C"/>

  <!-- browser chrome -->
  <rect x="0" y="0" width="600" height="34" rx="10" fill="#1C1A16"/>
  <circle cx="22" cy="17" r="5" fill="#3a352c"/>
  <circle cx="40" cy="17" r="5" fill="#3a352c"/>
  <circle cx="58" cy="17" r="5" fill="#3a352c"/>
  <rect x="90" y="9" width="280" height="16" rx="8" fill="#13110D"/>
  <text x="104" y="21" font-family="monospace" font-size="10" fill="#8a7d5c">obito324hx.github.io/beauty-empire-demo</text>

  <!-- page background -->
  <rect x="0" y="34" width="600" height="341" fill="#0F0E0C"/>

  <!-- gold double-rule motif -->
  <rect x="40" y="58" width="200" height="2" fill="#D4AF37"/>
  <rect x="40" y="64" width="120" height="1" fill="#D4AF37" opacity="0.5"/>

  <!-- monogram -->
  <text x="40" y="84" font-family="serif" font-size="11" letter-spacing="2" fill="#D4AF37">B.E.S &#183; BEAUTY EMPIRE SALON</text>

  <!-- headline -->
  <text x="40" y="124" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#E8CB6E">Beauty Empire</text>
  <text x="40" y="160" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#E8CB6E">Salon</text>

  <!-- tagline -->
  <rect x="40" y="180" width="260" height="8" rx="3" fill="#F2E9D8" opacity="0.35"/>
  <rect x="40" y="194" width="200" height="8" rx="3" fill="#F2E9D8" opacity="0.35"/>

  <!-- CTA button -->
  <rect x="40" y="216" width="190" height="34" rx="5" fill="#D4AF37"/>
  <text x="65" y="238" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#0F0E0C">Book on WhatsApp</text>

  <!-- photo block placeholder -->
  <rect x="360" y="58" width="200" height="240" rx="6" fill="#1C1A16" stroke="#D4AF37" stroke-width="1.5" stroke-dasharray="5,4"/>
  <circle cx="460" cy="150" r="22" fill="#D4AF37" opacity="0.18"/>
  <path d="M438 188 Q460 158 482 188 Z" fill="#D4AF37" opacity="0.18"/>

  <!-- price rows -->
  <g font-family="monospace" font-size="12" fill="#F2E9D8">
    <line x1="40" y1="282" x2="320" y2="282" stroke="#D4AF37" stroke-opacity="0.25" stroke-dasharray="2,3"/>
    <text x="40" y="278">Box Braids</text>
    <text x="290" y="278" text-anchor="end" fill="#D4AF37">K350</text>

    <line x1="40" y1="308" x2="320" y2="308" stroke="#D4AF37" stroke-opacity="0.25" stroke-dasharray="2,3"/>
    <text x="40" y="304">Gel Manicure</text>
    <text x="290" y="304" text-anchor="end" fill="#D4AF37">K150</text>

    <line x1="40" y1="334" x2="320" y2="334" stroke="#D4AF37" stroke-opacity="0.25" stroke-dasharray="2,3"/>
    <text x="40" y="330">Lash Extensions</text>
    <text x="290" y="330" text-anchor="end" fill="#D4AF37">K200</text>
  </g>
